<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FinLingo AI | Multilingual Finance Jargon Assistant</title>
  <meta name="description" content="FinLingo AI helps you understand and translate finance jargon across banking, investing, insurance, accounting, fintech, and corporate finance." />
  <style>
    :root {
      --bg: #050815;
      --panel: #0d1327;
      --panel-2: #111a34;
      --text: #ebf1ff;
      --muted: #b9c7e5;
      --border: rgba(255,255,255,0.12);
      --blue: #78a8ff;
      --mint: #68f0cf;
      --violet: #ae8cff;
      --danger: #ff8f9e;
      --radius: 16px;
      --shadow: 0 12px 30px rgba(0,0,0,0.35);
      --max: 1100px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(1200px 600px at 20% -10%, rgba(120,168,255,0.25), transparent 60%),
        radial-gradient(900px 500px at 100% 0%, rgba(104,240,207,0.12), transparent 50%),
        radial-gradient(900px 500px at 50% 120%, rgba(174,140,255,0.12), transparent 55%),
        var(--bg);
      line-height: 1.5;
    }
    .wrap { max-width: var(--max); margin: 0 auto; padding: 24px 16px 48px; }
    .hero {
      margin-bottom: 18px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: linear-gradient(145deg, rgba(255,255,255,0.06), rgba(255,255,255,0.01));
      box-shadow: var(--shadow);
      padding: 26px;
    }
    .badge {
      display: inline-flex; align-items: center; gap: 8px;
      border: 1px solid rgba(104,240,207,0.35);
      border-radius: 999px; padding: 6px 10px;
      font-size: 12px; color: var(--mint);
      background: rgba(104,240,207,0.08);
      font-weight: 700;
    }
    h1 { font-size: clamp(1.8rem, 3.2vw, 2.7rem); margin: 14px 0 10px; }
    .sub { color: var(--muted); }
    .grid { display: grid; grid-template-columns: 1.4fr 1fr; gap: 16px; }
    .card {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: linear-gradient(150deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
      padding: 16px;
      box-shadow: var(--shadow);
    }
    select, textarea, button {
      width: 100%; border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      padding: 10px;
    }
    textarea { min-height: 100px; }
    .btn-primary { background: linear-gradient(120deg, var(--blue), var(--mint)); color: #081222; }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <span class="badge">⚡ AI-style Multilingual Finance Assistant</span>
      <h1>FinLingo AI</h1>
      <p class="sub">Translate finance jargon across industries.</p>
    </section>
  </main>
</body>
</html>

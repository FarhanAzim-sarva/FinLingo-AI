<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pixel Clash — Browser Fighting Game</title>
  <style>
    :root {
      --bg: #0f1220;
      --panel: #171a2b;
      --text: #f6f7ff;
      --muted: #98a1c0;
      --accent: #73fbd3;
      --warn: #ffd166;
      --danger: #ff5a79;
      --blue: #7fb3ff;
      --red: #ff8fa3;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 20% 0%, #1c2140 0, #0f1220 55%);
      color: var(--text);
      font-family: Inter, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      padding: 1rem;
    }

    .app {
      width: min(900px, 100%);
      background: var(--panel);
      border: 1px solid #2a3150;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
    }

    .hud {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 1rem;
      padding: 0.8rem 1rem;
      border-bottom: 1px solid #2a3150;
      background: #111528;
    }

    .bar-wrap {
      height: 18px;
      border: 1px solid #36406a;
      border-radius: 999px;
      overflow: hidden;
      background: #0a0d1a;
    }

    .bar {
      height: 100%;
      transition: width 120ms linear;
    }

    #p1Health { background: linear-gradient(90deg, var(--blue), #4e86ff); }
    #p2Health { background: linear-gradient(90deg, #ff5f78, var(--red)); margin-left: auto; }

    .round {
      text-align: center;
      min-width: 190px;
    }

    .timer {
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: 0.04em;
    }

    .status {
      color: var(--muted);
      font-size: 0.9rem;
    }

    canvas {
      width: 100%;
      height: auto;
      display: block;
      background: linear-gradient(#19213d, #171f37 40%, #121728 40%, #101523 100%);
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 0.8rem;
      padding: 1rem;
      border-top: 1px solid #2a3150;
      font-size: 0.9rem;
    }

    .panel {
      background: #101426;
      border: 1px solid #2a3150;
      border-radius: 10px;
      padding: 0.8rem;
    }

    .panel h2 {
      margin: 0 0 0.4rem;
      font-size: 1rem;
      color: var(--accent);
    }

    kbd {
      background: #273056;
      border: 1px solid #3e4d80;
      border-radius: 6px;
      padding: 0.05rem 0.4rem;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.82rem;
    }

    .message {
      color: var(--warn);
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="hud">
      <div class="bar-wrap"><div id="p1Health" class="bar" style="width:100%"></div></div>
      <div class="round">
        <div id="timer" class="timer">60</div>
        <div id="status" class="status">Fight!</div>
      </div>
      <div class="bar-wrap"><div id="p2Health" class="bar" style="width:100%"></div></div>
    </section>

    <canvas id="game" width="900" height="450" aria-label="Fighting game arena"></canvas>

    <section class="controls">
      <div class="panel">
        <h2>Player 1</h2>
        <p><kbd>A</kbd>/<kbd>D</kbd> move · <kbd>W</kbd> jump · <kbd>F</kbd> punch · <kbd>G</kbd> kick</p>
      </div>
      <div class="panel">
        <h2>Player 2</h2>
        <p><kbd>←</kbd>/<kbd>→</kbd> move · <kbd>↑</kbd> jump · <kbd>K</kbd> punch · <kbd>L</kbd> kick</p>
      </div>
      <div class="panel">
        <h2>Round</h2>
        <p>Best of 1. First to KO or highest health at timeout wins.</p>
        <p class="message">Press <kbd>R</kbd> to restart.</p>
      </div>
    </section>
  </main>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const gravity = 0.65;
    const floorY = canvas.height - 70;

    const ui = {
      p1Health: document.getElementById("p1Health"),
      p2Health: document.getElementById("p2Health"),
      timer: document.getElementById("timer"),
      status: document.getElementById("status")
    };

    class Fighter {
      constructor(opts) {
        Object.assign(this, opts);
        this.w = 54;
        this.h = 110;
        this.vx = 0;
        this.vy = 0;
        this.health = 100;
        this.grounded = false;
        this.facing = this.name === "P1" ? 1 : -1;
        this.punchCooldown = 0;
        this.kickCooldown = 0;
        this.hitFlash = 0;
      }

      rect() {
        return { x: this.x, y: this.y, w: this.w, h: this.h };
      }

      getAttackBox(range, height) {
        return {
          x: this.facing === 1 ? this.x + this.w : this.x - range,
          y: this.y + 24,
          w: range,
          h: height
        };
      }

      update(enemy) {
        this.x += this.vx;
        this.y += this.vy;
        this.vy += gravity;

        if (this.y + this.h >= floorY) {
          this.y = floorY - this.h;
          this.vy = 0;
          this.grounded = true;
        } else {
          this.grounded = false;
        }

        this.x = Math.max(0, Math.min(canvas.width - this.w, this.x));

        if (enemy.x > this.x) this.facing = 1;
        else this.facing = -1;

        this.punchCooldown = Math.max(0, this.punchCooldown - 1);
        this.kickCooldown = Math.max(0, this.kickCooldown - 1);
        this.hitFlash = Math.max(0, this.hitFlash - 1);
      }

      attack(enemy, type) {
        let damage = 0;
        let box;

        if (type === "punch" && this.punchCooldown === 0) {
          this.punchCooldown = 20;
          damage = 8;
          box = this.getAttackBox(38, 34);
        }

        if (type === "kick" && this.kickCooldown === 0) {
          this.kickCooldown = 34;
          damage = 14;
          box = this.getAttackBox(56, 42);
        }

        if (!box) return false;

        if (intersects(box, enemy.rect())) {
          enemy.health = Math.max(0, enemy.health - damage);
          enemy.hitFlash = 6;
          enemy.vx += this.facing * 2.4;
          return true;
        }

        return false;
      }

      draw() {
        const bodyColor = this.hitFlash ? "#ffe89a" : this.color;
        ctx.fillStyle = bodyColor;
        roundRect(ctx, this.x, this.y, this.w, this.h, 10);
        ctx.fill();

        ctx.fillStyle = "#0b1022";
        const eyeX = this.facing === 1 ? this.x + this.w - 16 : this.x + 8;
        ctx.fillRect(eyeX, this.y + 20, 8, 8);

        if (this.punchCooldown > 14 || this.kickCooldown > 26) {
          const atk = this.kickCooldown > 26 ? this.getAttackBox(56, 42) : this.getAttackBox(38, 34);
          ctx.fillStyle = "rgba(255, 255, 255, 0.2)";
          ctx.fillRect(atk.x, atk.y, atk.w, atk.h);
        }
      }
    }

    const keys = new Set();
    let p1, p2, timeLeft, gameOver, frameCount;

    function resetGame() {
      p1 = new Fighter({ name: "P1", x: 140, y: floorY - 110, color: "#7fb3ff" });
      p2 = new Fighter({ name: "P2", x: 700, y: floorY - 110, color: "#ff8fa3" });
      timeLeft = 60;
      gameOver = false;
      frameCount = 0;
      ui.status.textContent = "Fight!";
      syncHud();
    }

    function syncHud() {
      ui.p1Health.style.width = `${p1.health}%`;
      ui.p2Health.style.width = `${p2.health}%`;
      ui.timer.textContent = String(timeLeft);
    }

    function handleInput() {
      p1.vx = 0;
      p2.vx = 0;

      if (keys.has("a")) p1.vx = -4;
      if (keys.has("d")) p1.vx = 4;
      if (keys.has("arrowleft")) p2.vx = -4;
      if (keys.has("arrowright")) p2.vx = 4;
    }

    function endGame() {
      gameOver = true;
      let message;
      if (p1.health === p2.health) message = "Draw!";
      else if (p1.health > p2.health) message = "Player 1 wins!";
      else message = "Player 2 wins!";
      ui.status.textContent = `${message} Press R to rematch.`;
    }

    function gameLoop() {
      requestAnimationFrame(gameLoop);

      if (!gameOver) {
        handleInput();
        p1.update(p2);
        p2.update(p1);

        frameCount++;
        if (frameCount % 60 === 0) {
          timeLeft = Math.max(0, timeLeft - 1);
          if (timeLeft === 0) endGame();
        }

        if (p1.health === 0 || p2.health === 0) {
          endGame();
        }
      }

      drawScene();
      syncHud();
    }

    function drawScene() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "#2f406c";
      for (let i = 0; i < 14; i++) {
        ctx.fillRect(i * 70, floorY - 4, 44, 4);
      }

      ctx.fillStyle = "#0f1426";
      ctx.fillRect(0, floorY, canvas.width, canvas.height - floorY);

      p1.draw();
      p2.draw();
    }

    function intersects(a, b) {
      return (
        a.x < b.x + b.w &&
        a.x + a.w > b.x &&
        a.y < b.y + b.h &&
        a.y + a.h > b.y
      );
    }

    function roundRect(ctx2d, x, y, w, h, r) {
      ctx2d.beginPath();
      ctx2d.moveTo(x + r, y);
      ctx2d.arcTo(x + w, y, x + w, y + h, r);
      ctx2d.arcTo(x + w, y + h, x, y + h, r);
      ctx2d.arcTo(x, y + h, x, y, r);
      ctx2d.arcTo(x, y, x + w, y, r);
      ctx2d.closePath();
    }

    window.addEventListener("keydown", (e) => {
      const key = e.key.toLowerCase();
      keys.add(key);

      if (key === "w" && p1.grounded && !gameOver) p1.vy = -13;
      if (key === "arrowup" && p2.grounded && !gameOver) p2.vy = -13;
      if (key === "f" && !gameOver) p1.attack(p2, "punch");
      if (key === "g" && !gameOver) p1.attack(p2, "kick");
      if (key === "k" && !gameOver) p2.attack(p1, "punch");
      if (key === "l" && !gameOver) p2.attack(p1, "kick");
      if (key === "r") resetGame();
    });

    window.addEventListener("keyup", (e) => {
      keys.delete(e.key.toLowerCase());
    });

    resetGame();
    gameLoop();
  </script>
</body>
</html>
